<body style="background-color:black;">
  <style>
    ::selection {
      background-color : red;
      color : blue;
    }
   
  </style>
 
<p id="color"; style="color: white; text-align: center; font-size: 30px;">

<br>
<br><br><br> 첫 문제를 푸셨군요.
<br><br> 미궁에 들어서자 주변이 매우 어두워졌습니다.
<br><br> 주위를 밝힐 방법이 당신에게 있을까요?
</p>
 <script>

  let lastText = "";
  const colorStart = document.getElementById("color");

  document.addEventListener("selectionchange", () => {
  const selection = window.getSelection();

  if (selection.rangeCount === 0) return;

  const range = selection.getRangeAt(0);
  if (range.collapsed) return;

  text = selection.toString();
  if (text !== lastText) {

  function unwrapSpan(node) {
  if (node.nodeType === 1 && node.tagName === "SPAN") {
    const parent = node.parentNode;

    while (node.firstChild) {
      parent.insertBefore(node.firstChild, node);
    }

    parent.removeChild(node);
  }
}
  const contents = range.extractContents();
  contents.querySelectorAll("span").forEach(unwrapSpan);
  const span = document.createElement("span");
  span.style.color = "yellow"; // 또는 color 
  span.appendChild(contents);
  range.insertNode(span);
   
    lastText = text;
  }

  // 선택 해제
});
  
</script>
<p style="color: black; text-align: center; font-size: 30px;">
