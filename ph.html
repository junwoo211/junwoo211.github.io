<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="ox.js"></script>
</head>

<body style="background-color: black;">
  <style>
    /* ::selection {
      background-color: red;
      color: blue;
    } */
  </style>

  <p style="color: white; text-align: center; font-size: 30px;">
    <br><br><br><br>
    첫 문제를 푸셨군요.
    <br><br>
    미궁에 들어서자 주변이 매우 어두워졌습니다.
    <br><br>
    주위를 밝힐 방법이 당신에게 있을까요?
    <br><br>
    <span id="target"></span>
  </p>

  <div style="text-align: center;">
    <input 
      type="text" 
      id="try" 
      style="width: 300px; height: 40px; font-size: 30px; user-select: none;"
      onkeydown="if(event.key === 'Enter') ox('coding', '3.html')"
      placeholder="답을 입력하세요"
    >
    <button 
      style="width: 100px; height: 50px; font-size: 30px; user-select: none; margin-left: 10px;"
      onclick="ox('coding', '3.html')"
    >
      확인
    </button>
  </div>

  <script>
    const text = `네 그렇습니다.
드래그를 하면 어두워서 안보이던 글씨도 보이게 됩니다.
정답은 coding 입니다.`;

    const container = document.getElementById("target");

    // 텍스트를 span 요소로 변환
    text.split("").forEach(char => {
      if (char === "\n") {
        container.appendChild(document.createElement("br"));
      } else {
        const span = document.createElement("span");
        span.className = "color";
        span.style.color = "black";
        span.textContent = char;
        container.appendChild(span);
      }
    });

    // iOS Safari 체크
    function isIOSSafari() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent)
        || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    }

    // 선택 감지 시 색상 변경
    document.addEventListener("selectionchange", () => {
      if (isIOSSafari()) {
        const selection = window.getSelection();

        container.querySelectorAll("span.color").forEach(el => {
          if (selection.containsNode(el, true)) {
            el.style.color = "white";
          } else {
            el.style.color = "black";
          }
        });
      }
    });
  </script>
</body>
</html>
